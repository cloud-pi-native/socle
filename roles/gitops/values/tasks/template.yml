---
- name: Set path fact
  ansible.builtin.set_fact:
    path: "{{ role_path + '/templates/' + item.1.argocd_app + '/values' }}"

- name: Compute "{{ item.1.argocd_app }}" Helm values
  ansible.builtin.include_role:
    name: combine
  vars:
    combine_path: "{{ path }}"
    combine_user_values: "{{ dsc[item.1.argocd_app]['values'] }}"
    combine_dest_var: "{{ item.1.argocd_app }}_values"

- name: Template values.j2 and write to destination
  ansible.builtin.copy:
    content: "{{ lookup('vars', item.1.argocd_app ~ '_values') | to_nice_yaml(indent=2) }}"
    dest: "gitops/apps/{{ item.1.argocd_app }}/values/{{ item.0.name }}.yaml"
    mode: '0644'
