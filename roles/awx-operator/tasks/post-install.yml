---
- name: Wait awx-operator-admin-password secret
  kubernetes.core.k8s_info:
    kind: Secret
    namespace: "{{ dsc.awx.namespace }}"
    name: awx-operator-admin-password
  register: secret
  until: secret.resources[0].data.password is defined
  retries: 30
  delay: 5

- name: Get awx admin password
  kubernetes.core.k8s_info:
    kind: Secret
    namespace: "{{ dsc.awx.namespace }}"
    name: awx-operator-admin-password
  register: awx_admin_password
  failed_when: awx_admin_password.resources | length == 0

- name: Get awx client secret
  kubernetes.core.k8s_info:
    kind: Secret
    namespace: "{{ dsc.keycloak.namespace }}"
    name: keycloak-client-secret-awx-client
  register: awx_secret
  failed_when: awx_secret.resources | length == 0

- name: Wait awx-operator-service endpoint
  kubernetes.core.k8s_info:
    kind: Endpoints
    namespace: "{{ dsc.awx.namespace }}"
    name: awx-operator-service
  register: endpoint
  until: endpoint.resources[0].subsets[0].addresses[0] is defined
  retries: 30
  delay: 10

- name: Pause for 5 minutes to wait for AWX operator job to start
  ansible.builtin.pause:
    minutes: 5

- name: Check the status of the AWX operator job
  kubernetes.core.k8s_info:
    kind: Job
    namespace: "{{ dsc.awx.namespace }}"
    name: awx-operator-migration-24.6.1
  register: job_status
  until: job_status.resources[0].status.succeeded == 1
  retries: 60
  delay: 10

- name: Configure oidc auth method
  ansible.builtin.uri:
    validate_certs: "{{ dsc.exposedCA.type == 'none' }}"
    url: "https://{{ awx_domain }}/api/v2/settings/oidc/"
    method: PUT
    status_code: [200, 204]
    password: "{{ awx_admin_password.resources[0].data.password | b64decode }}"
    user: admin
    force_basic_auth: true
    follow_redirects: "all"
    body:
      "SOCIAL_AUTH_OIDC_KEY": "{{ awx_secret.resources[0].data.CLIENT_ID | b64decode }}"
      "SOCIAL_AUTH_OIDC_OIDC_ENDPOINT": "https://{{ keycloak_domain }}/realms/dso"
      "SOCIAL_AUTH_OIDC_SECRET": "{{ awx_secret.resources[0].data.CLIENT_SECRET | b64decode }}"
      "SOCIAL_AUTH_OIDC_VERIFY_SSL": false
    body_format: "json"
