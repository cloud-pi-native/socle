---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-cluster-harbor
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16.1
  postgresql:
    parameters:
      max_worker_processes: "60"
      max_slot_wal_keep_size: 5GB
    pg_hba:
      # To access through TCP/IP you will need to get username
      # and password from the secret pg-cluster-harbor-app
      - host harbor keycloak all md5
      - host harbor streaming_replica all md5
  bootstrap:
    initdb:
      database: harbordb
      owner: dso_admin
    recovery: null
  primaryUpdateStrategy: unsupervised
  storage:
    size: 6Gi
  walStorage:
    size: 6Gi
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 2Gi
      cpu: 500m
  monitoring:
    enablePodMonitor: false
{{- if .Values.harbor.cnpg.backup.enabled }}
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: pg-cluster-harbor
spec:
  schedule: <path:forge-dso/data/env/dso-hp-testcm/apps/harbor/values#cnpg | jsonPath {.backup.cron}>
  backupOwnerReference: self
  cluster:
    name: pg-cluster-harbor
{{- end }}
{{- if .Values.harbor.cnpg.exposed }}
---                                                                                                                                             
apiVersion: v1
kind: Service
metadata:
  labels:
    cnpg.io/cluster: pg-cluster-harbor
  name: pg-cluster-harbor-rw-nodeport
spec:
  ports:
  - name: postgres
    port: 5432
    protocol: TCP
    nodePort: <path:forge-dso/data/env/dso-hp-testcm/apps/harbor/values#cnpg | jsonPath {.nodePort}>
  selector:
    cnpg.io/cluster: pg-cluster-harbor
    role: primary
  type: NodePort
{{- end }}

