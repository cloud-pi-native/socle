apiVersion: v1
kind: Secret
metadata:
  labels:
    argocd.argoproj.io/secret-type: repo-creds
  name: gitlab
  namespace: dso-argocd
type: Opaque
stringData:
  password: <path:forge-dso/data/env/conf-dso/apps/gitlab/values#gitlabToken>
  url: "https://<path:forge-dso/data/env/conf-dso/apps/common/values#domain | jsonPath {.gitlab}>/my-root-dir/projects-sub-dir"
  username: "root"
