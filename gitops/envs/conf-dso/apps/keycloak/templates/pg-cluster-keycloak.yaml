apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-cluster-keycloak
  namespace: dso-keycloak
spec:
  backup: null
  bootstrap:
    initdb:
      database: keycloak
      owner: keycloak
    recovery: null
  enableSuperuserAccess: true
  imageName: <path:forge-dso/data/env/conf-dso/apps/common/values#image | jsonPath
    {.repository.docker}>/cloudnative-pg/postgresql:16.1
  instances: 3
  monitoring:
    enablePodMonitor: true
  postgresql:
    parameters:
      max_worker_processes: '60'
    pg_hba:
    - host keycloak keycloak all md5
    - host keycloak streaming_replica all md5
  primaryUpdateStrategy: unsupervised
  storage:
    size: 5Gi
