gitlab-ci-pipelines-exporter:
  command:
  - sh
  - -c
  - echo "$CUSTOM_CA_CERT" > /tmp/custom-ca.crt && gitlab-ci-pipelines-exporter run
    --config /etc/config.yml
  config:
    gitlab:
      token: <path:forge-dso/data/env/conf-dso/apps/gitlab/values#gitlabToken>
      url: https://<path:forge-dso/data/env/conf-dso/apps/common/values#domain | jsonPath
        {.gitlab}>/
    redis:
      url: null
    wildcards:
    - {}
  envVariables:
  - name: SSL_CERT_FILE
    value: /tmp/custom-ca.crt
  - name: CUSTOM_CA_CERT
    valueFrom:
      secretKeyRef:
        key: tls.crt
        name: exposed-ca
  - name: HTTP_PROXY
    value: <path:forge-dso/data/env/conf-dso/apps/common/values#proxy | jsonPath {.httpProxy}>
  - name: HTTPS_PROXY
    value: <path:forge-dso/data/env/conf-dso/apps/common/values#proxy | jsonPath {.httpsProxy}>
  - name: NO_PROXY
    value: <path:forge-dso/data/env/conf-dso/apps/common/values#proxy | jsonPath {.noProxy}>
  image:
    repository: <path:forge-dso/data/env/conf-dso/apps/common/values#image | jsonPath
      {.repository.quay}>/mvisonneau/gitlab-ci-pipelines-exporter
  serviceMonitor:
    enabled: true
    endpoints:
    - interval: 30s
      path: /metrics
      port: http
