apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  generation: 1
  labels:
    app: nexus
  name: nexus
  namespace: dso-nexus
spec:
  endpoints:
  - basicAuth:
      username:
        name: admin-creds
        key: username
      password:
        name: admin-creds
        key: password
    interval: 15s
    path: /service/metrics/prometheus
    port: http
  namespaceSelector:
    matchNames:
    - dso-nexus
  selector:
    matchLabels:
      app: nexus